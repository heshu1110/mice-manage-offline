{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
    <div class="panel-header">
        <div>
            <h1>JSON导入</h1>
            <p class="muted">把手机导出的待同步 JSON 文件导入到服务器数据库。</p>
        </div>
    </div>

    {% if import_message %}
    <div class="notice-banner {{ import_status if import_status else 'info' }}">{{ import_message }}</div>
    {% endif %}

    {% if current_user %}
    <form method="post" action="/imports/sync-json" enctype="multipart/form-data" class="stack-form">
        <input type="hidden" name="next_url" value="/json-import">
        <label for="json-file">选择JSON文件</label>
        <input id="json-file" type="file" name="file" accept=".json,application/json" required>
        <button type="submit">导入JSON</button>
    </form>

    <div class="form-actions">
        <a class="ghost-button link-button" href="/exports/bootstrap.json">导出基础数据 JSON</a>
    </div>
    {% else %}
    <p class="muted">请先登录再导入 JSON。</p>
    <div class="form-actions">
        <a class="ghost-button link-button" href="/login">前往登录</a>
    </div>
    {% endif %}
</section>
{% endblock %}
