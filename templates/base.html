<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else "Mice Manage" }}</title>
    <meta name="theme-color" content="#9a6b3a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/static/styles.css?v=20260326e">
</head>
<body>
    <header class="topbar">
        <div>
            <a class="brand" href="/">Mice Manage</a>
        </div>
        <nav class="nav">
            <a href="/">离线录入</a>
            <a href="/dashboard">服务器数据</a>
            <a href="/json-import">JSON导入</a>
            <a href="/records">操作记录</a>
            {% if current_user and current_user.role == "admin" %}
            <a href="/users">用户管理</a>
            {% endif %}
            {% block header_actions %}{% endblock %}
            {% if current_user %}
            <span class="user-chip">{{ current_user.name }} / {{ current_user.role }}</span>
            <form method="post" action="/logout">
                <button type="submit" class="ghost-button">退出</button>
            </form>
            {% else %}
            <a class="ghost-button link-button" href="/login">登录</a>
            {% endif %}
        </nav>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js", { scope: "/" }).catch(function (error) {
                    console.error("Service worker registration failed:", error);
                });
            });
        }
    </script>
</body>
</html>
